name: census-core-services
services:
  db:
    image: postgres:latest
    container_name: 'cc-db'
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: db02
    ports:
      - '5432:5432'
    volumes:
      - ccccpgdata:/var/lib/postgresql
    command:
      - postgres
      - -c
      - wal_level=logical

  minio:
    image: minio/minio
    container_name: 'cc-minio'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    restart: always
    ports:
      # Avoid clashes with other tools on 9000/9001 (e.g. php-fpm, other MinIO)
      - '19000:9000'
      - '19001:9001'
    volumes:
      - ccminiodata:/data

  # Create bucket `census` + anonymous read (download). Must match S3_BUCKET=census in census/api/.env.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: 'no'
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb local/census --ignore-existing
        mc anonymous set download local/census
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

volumes:
  ccminiodata:
  ccccpgdata:
