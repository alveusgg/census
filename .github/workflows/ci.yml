name: CI

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  CENSUS_API_IMAGE: ghcr.io/${{ github.repository }}/api
  IPX_IMAGE: ghcr.io/${{ github.repository }}/ipx
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_census_api:
    name: Build Census API
    uses: ./.github/workflows/build-census-api.yml

  build_census_ui:
    name: Build Census UI
    uses: ./.github/workflows/build-census-ui.yml

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build_census_api
      - build_census_ui
    permissions:
      id-token: write
      contents: read

    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-build
          path: census/website/ui

      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - uses: pulumi/auth-actions@141415910c3beb54e03b48e9057c204c97b956f2 # v2.1.0
        name: Login to Pulumi
        with:
          organization: alveusgg
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:changesbyjames

      - name: Login to Azure
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        name: Deploy infrastructure
        id: pulumi
        continue-on-error: true
        with:
          command: up
          stack-name: alveusgg/prod
          work-dir: infrastructure/pulumi
          config-map: |
            {
              "image": { value: "${{ env.CENSUS_API_IMAGE }}:${{ github.run_id }}", secret: false },
              "ipx": { value: "${{ env.IPX_IMAGE }}:latest", secret: false }
            }
        env:
          ARM_USE_OIDC: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build & upload worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          wranglerVersion: '4.80.0'
          workingDirectory: census/website
          preCommands: |
            echo '${{ steps.pulumi.outputs.wranglerConfig }}' > wrangler.generated.jsonc
            printf '%s' '${{ steps.pulumi.outputs.workerSourceBase64 }}' | base64 --decode > worker.generated.js
          command: |
            deploy --config wrangler.generated.jsonc --env prod

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alveus-sanctuary
          SENTRY_PROJECT: census
        with:
          environment: production
          release: ${{ github.sha }}
          ignore_missing: true
