name: Deploy Census

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      environment_url:
        required: true
        type: string
      pulumi_stack:
        required: true
        type: string
      wrangler_env:
        required: true
        type: string
      sentry_environment:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  CENSUS_API_IMAGE: ghcr.io/${{ github.repository }}/api
  IPX_IMAGE: ghcr.io/${{ github.repository }}/ipx
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-build
          path: census/website/ui

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - uses: pulumi/auth-actions@1c89817aab0c66407723cdef72b05266e7376640 # v1.0.1
        name: Login to Pulumi
        with:
          organization: alveusgg
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:changesbyjames

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        name: Deploy infrastructure
        id: pulumi
        continue-on-error: true
        with:
          command: up
          stack-name: ${{ inputs.pulumi_stack }}
          work-dir: infrastructure/pulumi
          config-map: |
            {
              "image": { value: "${{ env.CENSUS_API_IMAGE }}:${{ github.run_id }}", secret: false },
              "ipx": { value: "${{ env.IPX_IMAGE }}:latest", secret: false }
            }
        env:
          ARM_USE_OIDC: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build & upload worker
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          wranglerVersion: '4.80.0'
          workingDirectory: census/website
          preCommands: |
            echo '${{ steps.pulumi.outputs.wranglerConfig }}' > wrangler.generated.jsonc
            printf '%s' '${{ steps.pulumi.outputs.workerSourceBase64 }}' | base64 --decode > worker.generated.js
          command: |
            deploy --config wrangler.generated.jsonc --env ${{ inputs.wrangler_env }}

      - name: Create Sentry release
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alveus-sanctuary
          SENTRY_PROJECT: census
        with:
          environment: ${{ inputs.sentry_environment }}
          release: ${{ github.sha }}
          ignore_missing: true
