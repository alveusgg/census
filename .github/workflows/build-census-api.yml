name: Build Census API

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  CENSUS_API_IMAGE: ${{ github.repository }}/api

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Pin to latest so the GHA cache v2 API is always supported (the
          # legacy v1 service was shut down on 2025-04-15).
          version: latest

      - name: Log in to container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.CENSUS_API_IMAGE }}
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          # Use the locally checked-out repo as build context instead of the
          # default git context (which re-clones the repo inside BuildKit and
          # adds a few seconds per build).
          context: .
          file: census/api/Dockerfile
          target: runtime
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip provenance attestation - it adds extra build time and is not
          # consumed by anything in this project. Re-enable if you start
          # publishing SLSA attestations.
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
