name: Build Census API

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  CENSUS_API_IMAGE: ${{ github.repository }}/api

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Pin to latest so the GHA cache v2 API is always supported (the
          # legacy v1 service was shut down on 2025-04-15).
          version: latest

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.CENSUS_API_IMAGE }}
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          # Use the locally checked-out repo as build context instead of the
          # default git context (which re-clones the repo inside BuildKit and
          # adds a few seconds per build).
          context: .
          file: census/api/Dockerfile
          target: runtime
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip provenance attestation - it adds extra build time and is not
          # consumed by anything in this project. Re-enable if you start
          # publishing SLSA attestations.
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
